name: Sync to Shared Repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Personal Repository
        uses: actions/checkout@v7
        with:
          path: personal-repo

      - name: Checkout Shared Repository
        uses: actions/checkout@v7
        with:
          repository: ensharp-algorithm/study-authentication
          token: ${{ secrets.PAT_TOKEN }}
          path: shared-repo
          ref: main

      - name: Sync personal solutions into vvineey folder
        run: |
          mkdir -p shared-repo/vvineey
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            personal-repo/ shared-repo/vvineey/

      - name: Commit and push changes
        run: |
          cd shared-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add vvineey

          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Auto-sync: vvineey 알고리즘 문제 풀이 업데이트"
            git push origin main
          fi
